<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rastreabilidade — Viasoft</title>
  <script>
    (function () {
      const t = localStorage.getItem('viasoft-theme') || 'dark';
      document.documentElement.setAttribute('data-bs-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar" class="navbar px-3 py-2" style="background-color:#1a1a2e;">
    <span class="navbar-brand text-white fw-bold mb-0">
      <i class="bi bi-diagram-3 me-2"></i>Rastreabilidade de Documentos
    </span>
    <button id="btnTema" class="btn btn-sm btn-outline-light">
      <i class="bi bi-moon-stars-fill"></i>
    </button>
  </nav>

  <!-- Toolbar de consulta -->
  <div id="toolbar" class="px-3 pt-2 pb-2 border-bottom">
    <form id="formConsulta" class="d-flex flex-wrap gap-2 align-items-end">
      <div>
        <label class="form-label small mb-1">Tipo de Documento</label>
        <select id="selTela" class="form-select form-select-sm" style="min-width:160px;">
          <option value="DUPREC">Duplicata a Receber</option>
          <option value="DUPPAG">Duplicata a Pagar</option>
          <option value="NFCAB">Nota Fiscal</option>
          <option value="PEDCAB">Pedido de Venda</option>
          <option value="CONTAMOV">Conta Movimento</option>
          <option value="CHEQREC">Cheque Recebido</option>
          <option value="CHEQEMI">Cheque Emitido</option>
        </select>
      </div>
      <div id="grpEmpresa">
        <label id="lblEmpresa" class="form-label small mb-1">Empresa</label>
        <input id="inpEmpresa" type="number" class="form-control form-control-sm" value="1" style="width:75px;" />
      </div>
      <div id="grpEstab" style="display:none;">
        <label class="form-label small mb-1">Estab</label>
        <input id="inpEstab" type="number" class="form-control form-control-sm" value="1" style="width:75px;" />
      </div>
      <div id="grpSerie" style="display:none;">
        <label class="form-label small mb-1">Série</label>
        <input id="inpSerie" type="text" class="form-control form-control-sm" style="width:85px;" />
      </div>
      <div id="grpEstabCliente" style="display:none;">
        <label class="form-label small mb-1">Estab. Cliente</label>
        <input id="inpEstabCliente" type="number" class="form-control form-control-sm" style="width:100px;" />
      </div>
      <div id="grpCliente" style="display:none;">
        <label class="form-label small mb-1">Cliente (NUMEROCM)</label>
        <input id="inpCliente" type="number" class="form-control form-control-sm" style="width:130px;" />
      </div>
      <div id="grpEmitente" style="display:none;">
        <label class="form-label small mb-1">Emitente</label>
        <input id="inpEmitente" type="text" class="form-control form-control-sm" style="min-width:180px;" />
      </div>
      <div id="grpBanco" style="display:none;">
        <label class="form-label small mb-1">Banco</label>
        <input id="inpBanco" type="text" class="form-control form-control-sm" style="min-width:160px;" />
      </div>
      <div id="grpPortador" style="display:none;">
        <label class="form-label small mb-1">Portador</label>
        <input id="inpPortador" type="number" class="form-control form-control-sm" style="width:90px;" />
      </div>
      <div>
        <label class="form-label small mb-1" id="lblDoc">Número da Duplicata</label>
        <input id="inpDoc" type="text" class="form-control form-control-sm" placeholder="ex: 359511-1" style="min-width:170px;" />
      </div>
      <div>
        <button type="submit" class="btn btn-primary btn-sm">
          <i class="bi bi-search me-1"></i>Rastrear
        </button>
      </div>
      <div id="areaStatus" class="ms-2 d-flex align-items-center"></div>
    </form>
  </div>

  <!-- Área do grafo (posição absoluta, preenche o restante da tela) -->
  <div id="mainArea">
    <div id="network"></div>

    <div id="emptyState" class="empty-state">
      <i class="bi bi-diagram-3 display-4 text-muted"></i>
      <p class="text-muted mt-2">Informe os parâmetros e clique em Rastrear</p>
    </div>

    <div class="graph-controls">
      <button class="btn btn-sm btn-secondary" id="btnFit" title="Ajustar tela"><i class="bi bi-fullscreen"></i></button>
      <button class="btn btn-sm btn-secondary" id="btnZoomIn" title="Zoom +"><i class="bi bi-zoom-in"></i></button>
      <button class="btn btn-sm btn-secondary" id="btnZoomOut" title="Zoom -"><i class="bi bi-zoom-out"></i></button>
    </div>

    <!-- Painel lateral de detalhes -->
    <div id="painelDetalhe" class="painel-detalhe d-none">
      <div class="d-flex justify-content-between align-items-center px-3 pt-3 pb-2 border-bottom">
        <span id="detalheTitle" class="fw-semibold small"></span>
        <button class="btn btn-sm btn-link p-0 text-muted" id="btnFecharDetalhe">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div id="detalheBody" class="px-3 py-2 overflow-auto"></div>
    </div>
  </div>

  <!-- Modal Recibo -->
  <div class="modal fade" id="modalRecibo" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title fw-bold" id="modalReciboTitulo">Recibo</h6>
          <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0">
          <div id="modalReciboBody" style="font-family:'Courier New',monospace;font-size:0.8rem;padding:16px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <script src="/assets/app.js?v=30"></script>
</body>
</html>
